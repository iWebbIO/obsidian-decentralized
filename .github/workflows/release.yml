name: Build and Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'New Version (e.g. 2.2.0)'
        required: true
        type: string
      tag_name:
        description: 'Release Tag Name (e.g. 2.2.0)'
        required: true
        type: string
      release_name:
        description: 'Release Name (e.g. Release v2.2.0)'
        required: true
        type: string
      is_pre_release:
        description: 'Publish as a Pre-release?'
        required: false
        type: boolean
        default: false

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: 'npm'

      - name: Bump versions
        run: |
          # Update package.json and package-lock.json
          npm version ${{ inputs.version }} --no-git-tag-version
          
          # Update manifest.json
          jq '.version = "${{ inputs.version }}"' manifest.json > tmp.json && mv tmp.json manifest.json

      - name: Install dependencies
        run: npm ci

      - name: Build plugin
        run: npm run build

      - name: Commit and Push Version Bump
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add package.json package-lock.json manifest.json
          git commit -m "chore: bump version to ${{ inputs.version }}"
          git push

      - name: Create GitHub Release and Upload Assets
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "${{ inputs.tag_name }}" \
            --title "${{ inputs.release_name }}" \
            --notes "Release ${{ inputs.tag_name }} generated by GitHub Actions" \
            ${{ inputs.is_pre_release == 'true' && '--prerelease' || '' }} \
            main.js manifest.json